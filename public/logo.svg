<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#0A0A1A"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,107,43,0.07)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="512" height="512" rx="64" fill="url(#grid)"/>
  <!-- Diamond mark -->
  <polygon points="256,110 330,256 256,402 182,256" fill="none" stroke="#FF6B2B" stroke-width="18" stroke-linejoin="round"/>
  <polygon points="256,168 302,256 256,344 210,256" fill="#FF6B2B" opacity="0.9"/>
  <!-- Wordmark -->
  <text x="256" y="448" font-family="Arial Black, Arial, sans-serif" font-size="62" font-weight="900" fill="#F0F0F5" text-anchor="middle" letter-spacing="-2">
    <tspan fill="#F0F0F5">3D</tspan><tspan fill="#FF6B2B">Print</tspan><tspan fill="#F0F0F5">Map</tspan>
  </text>
</svg>
